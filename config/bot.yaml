# GabaBook MM Bot — Configuration
# All prices in USDC, sizes in shares

# ==========================================
# AJUSTE PRINCIPAL: quantos niveis de grid?
#   1 = conservador  (iniciar aqui)
#   3 = moderado     (depois de aprender)
#   5 = completo     (maximo, experiente)
# ==========================================
grid_levels: 1

# === Grid Dinamico (detalhes — ignorado se grid_levels > 0) ===
grid:
  max_levels: 5                # niveis por lado por token
  level_spacing_ticks: 2       # 2 ticks (0.02) entre niveis
  level_size: 5                # 5 shares por nivel (minimo Polymarket)
  early_buy_levels: 1          # EARLY: 1 nivel de compra (cauteloso)
  early_sell_levels: 1         # EARLY: 1 nivel de venda
  mid_buy_levels: 0            # MID: stop buying (adverse selection risk near expiry)
  mid_sell_levels: 5

price_move_threshold: 0.01     # cancela nivel se preco mudou >= 1 tick

# === Skew Direcional (trend/inventory/imbalance/BTC lead) ===
skew:
  enabled: true
  shadow_mode: false             # LIVE: aplica skew nos precos das ordens

  price_window_seconds: 20       # velocity: janela de 20s
  imbalance_window_seconds: 8    # book imbalance: 8s (mais rapido)
  underlying_window_seconds: 45  # BTC lead: 45s (mais suave)

  ema_alpha: 0.22                # smoothing (~4 amostras efetivas)

  weights:
    velocity: 0.25               # momentum local do mid-price
    imbalance: 0.20              # desbalanceamento bid/ask
    inventory: 0.20              # pressao corretiva de inventario
    underlying_lead: 0.35        # sinal antecipado BTC (Binance)

  max_velocity_per_sec: 0.004    # 0.4c/s = sinal maximo
  max_underlying_move_pct: 0.0025  # 0.25%/min BTC = sinal maximo

  max_reservation_adj: 0.02      # 2 ticks max para deslocar centro
  max_side_adj: 0.01             # 1 tick max para agressividade por lado (0.005 arredondava a zero)

  lateral_threshold: 0.12        # |score| abaixo = flat (scale 0.3x)
  strong_threshold: 0.35         # |score| acima = strong_trend

  time_scaling:
    early: 0.40                  # >5min: cauteloso
    mid: 0.70                    # 1-5min: moderado
    late: 1.00                   # 30s-1min: maximo
    exit: 0.00                   # <30s: sem skew

# === Soma Check (mispricing UP+DOWN ≈ 1.0) ===
soma:
  enabled: true
  fair_value: 1.0              # soma teorica esperada
  threshold: 0.03              # divergencia minima para ativar (3 ticks)
  max_adjustment: 0.03         # ajuste maximo por lado (3 ticks)
  aggression: 0.5              # fracao da divergencia usada como offset

# === Quoting ===
tick: 0.01
order_size: 5                  # compatibilidade (grid usa grid.level_size)
min_spread: 0.01               # spread minimo (BTC 15m tipicamente tem 1 tick; skew protege)
quote_ttl_ms: 8000             # TTL das ordens: 8s (grid e menos agressivo em cancel)

# === Inventory ===
net_soft_limit: 5              # inicia skew com 5 shares liquidos (match grid_levels=1)
net_hard_limit: 10             # para de cotar com 10 shares liquidos
max_position: 5                # max shares por token (1 nivel x 5 shares)

# === Orders ===
max_orders_per_side: 10        # 5 niveis BUY + 5 SELL por token
max_cancel_per_min: 180

# === Time Regimes (segundos restantes) ===
t_early: 300                   # > 5min: 1 nivel, spread largo
t_mid: 120                     # 2-5min: sell only (reduz adverse selection perto do fim)
t_late: 30                     # 30s-1min: so SELL para desovar
t_exit: 15                     # < 15s: cancela tudo, sai

# === Pair / Arb ===
min_pair_edge: 0.02
fee_buffer: 0.02
max_pair_size: 10
min_pair_size: 2

# === Risk ===
max_daily_loss: -3.0           # USDC, aciona kill switch (preserva capital durante ajuste)
stale_book_ms: 60000           # idade maxima do book (60s — mercados BTC 15m tem atividade intermitente)
max_rejects: 10
max_consecutive_losses: 3
cooldown_s: 1800               # 30min de cooldown apos kill

# === Logging ===
log_dir: "logs"
snapshot_interval_s: 30

# === Mode ===
dry_run: false                 # false = ordens reais no Polymarket
